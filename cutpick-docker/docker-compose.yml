services:
  postgres:
    image: postgres:16-alpine
    container_name: cutpick-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: cutpick
      POSTGRES_PASSWORD: cutpick
      POSTGRES_DB: cutpick_db
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: cutpick-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

volumes:
  postgres_data:
  redis_data:
